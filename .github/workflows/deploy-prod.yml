name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to Prod EC2 via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cd /var/www/nosdicengeeks-prod",
              "sudo -u ubuntu git pull origin main",
              "sudo -u ubuntu bash -c \"source /home/ubuntu/.nvm/nvm.sh && nvm use 22 && npm install --production=false\"",
              "sudo -u ubuntu bash -c \"source /home/ubuntu/.nvm/nvm.sh && nvm use 22 && npm run build\"",
              "sudo -u ubuntu bash -c \"source /home/ubuntu/.nvm/nvm.sh && nvm use 22 && cd admin && npm install --production=false\"",
              "sudo -u ubuntu bash -c \"pm2 stop ndg-admin-prod && pm2 delete ndg-admin-prod && source /home/ubuntu/.nvm/nvm.sh && nvm use 22 && pm2 start /var/www/nosdicengeeks-prod/admin/server.js --name ndg-admin-prod --cwd /var/www/nosdicengeeks-prod/admin && pm2 save\""
            ]' \
            --comment "Deploy from GitHub Actions - ${{ github.sha }}" \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          # Esperar que termine
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

          # Ver output
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "[StandardOutputContent, StandardErrorContent]" \
            --output text

      - name: Verify deployment
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://nosdicengeeks.com)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Deployment verification failed!"
            exit 1
          fi
          echo "Deployment successful!"
