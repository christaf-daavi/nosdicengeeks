<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>En Construcción</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#f2f0ec;
  color:#2e2b27;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  text-align:center;
}

/* CINTAS */
.tape{
  width:100%;
  height:14px;
  background: repeating-linear-gradient(
    45deg,
    #000,
    #000 15px,
    #ffd000 15px,
    #ffd000 30px
  );
  background-size: 40px 40px;
  animation: moveTape 2s linear infinite;
}
.bottom{
  margin-top:auto;
  animation-direction: reverse;
}

/* CONTENEDOR */
.container{
  max-width:600px;
  padding:40px 20px;
}

/* ICONO */
.icon{
  font-size:42px;
  color:#f59e0b;
  margin-bottom:10px;
}

/* TITULO */
h1{
  font-size:3rem;
  margin:10px 0;
}

/* TEXTO */
.subtitle{
  color:#6d6a66;
  line-height:1.5;
  margin-bottom:35px;
}

/* PROGRESO */
.progress-label{
  display:flex;
  justify-content:space-between;
  font-size:0.8rem;
  color:#8a867f;
}

.progress-bar{
  width:100%;
  height:10px;
  background:#dedbd5;
  border-radius:20px;
  margin-top:6px;
}

.progress{
  width:15%;
  height:100%;
  background:#f59e0b;
  border-radius:20px;
}

/* ICONOS */
.tools{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:35px 0;
}

.tool{
  width:55px;
  height:55px;
  border:1px solid #d7d2ca;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  color:#8a867f;
  background:#f6f4f1;
}

/* CAJA EMAIL */
.notify{
  border:1px solid #e2ddd5;
  border-radius:14px;
  padding:25px;
  background:#f7f5f2;
}

.notify p{
  margin:8px 0 0;
  color:#6d6a66;
}

/* FOOTER */
footer{
  font-size:0.75rem;
  color:#8a867f;
  margin:18px 0;
}

@keyframes moveTape{
  from { background-position: 0 0; }
  to { background-position: 40px 0; }
}

/* LOGO */

.logo img{
  width:90px;
  opacity:.9;
  animation: float 4s ease-in-out infinite;
}

@keyframes float{
  0%,100%{ transform: translateY(0);}
  50%{ transform: translateY(-6px);}
}

</style>
</head>
<body>

<div class="tape"></div>

<div class="logo">
  <img src="logo.png" alt="Logo">
</div>

<div class="container">

  <div class="icon">🚧</div>

  <h1>En Construcción</h1>

  <div class="subtitle">
    Estamos construyendo algo increíble. Este sitio está<br>
    tomando forma en este momento.
  </div>

  <div class="progress-label">
    <span>progreso</span>
    <span style="color:#f59e0b;">15%</span>
  </div>
  <div class="progress-bar">
    <div class="progress"></div>
  </div>

  <div class="tools">
    <div class="tool">🔨</div>
    <div class="tool">🔧</div>
    <div class="tool">⚠️</div>
    <div class="tool">🕒</div>
  </div>
</div>

<footer>
© 2026 · Construcción en progreso · Vuelve pronto
</footer>

<div class="tape bottom"></div>

</body>
</html>
